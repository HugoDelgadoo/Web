<section class="tarjeta" *ngIf="esAdmin">
  <h2>Módulo de Proveedores</h2>
  <form [formGroup]="formularioProveedor" (ngSubmit)="crearProveedor()" class="formulario">
    <input type="text" placeholder="Nombre proveedor" formControlName="nombre" />
    <input type="text" placeholder="Contacto" formControlName="contacto" />
    <input type="text" placeholder="Categoría" formControlName="categoria" />
    <button type="submit">Guardar</button>
  </form>
  <p class="error" *ngIf="mensajeError">{{ mensajeError }}</p>
</section>

<section class="tarjeta">
  <h2>Proveedores</h2>
  <table>
    <thead><tr><th>Nombre</th><th>Contacto</th><th>Categoría</th><th>Activo</th></tr></thead>
    <tbody>
      <tr *ngFor="let proveedor of proveedores">
        <td>{{ proveedor.nombre }}</td>
        <td>{{ proveedor.contacto }}</td>
        <td>{{ proveedor.categoria }}</td>
        <td>{{ proveedor.activo ? 'Sí' : 'No' }}</td>
      </tr>
    </tbody>
  </table>
</section>
