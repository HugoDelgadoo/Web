<section class="tarjeta">
  <h2>Gestión de Usuarios y Roles</h2>
  <form [formGroup]="formularioUsuario" (ngSubmit)="crearUsuario()" class="formulario">
    <input type="text" placeholder="Nombre" formControlName="nombre" />
    <input type="email" placeholder="Email" formControlName="email" />
    <select formControlName="rol">
      <option value="Empleado">Empleado</option>
      <option value="Admin">Admin</option>
    </select>
    <button type="submit">Guardar</button>
  </form>
  <p class="error" *ngIf="mensajeError">{{ mensajeError }}</p>
  <p class="exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
</section>

<section class="tarjeta">
  <table>
    <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th></tr></thead>
    <tbody>
      <tr *ngFor="let usuario of usuarios">
        <td>{{ usuario.nombre }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.rol }}</td>
        <td>{{ usuario.activo ? 'Sí' : 'No' }}</td>
      </tr>
    </tbody>
  </table>
</section>
