<section class="tarjeta">
  <h2>{{ 'users_management' | i18n }}</h2>
  <form [formGroup]="formularioUsuario" (ngSubmit)="crearUsuario()" class="formulario">
    <input type="text" [placeholder]="'name' | i18n" formControlName="nombre" />
    <input type="email" [placeholder]="'email' | i18n" formControlName="email" />
    <select formControlName="rol">
      <option value="Empleado">Empleado</option>
      <option value="Admin">Admin</option>
    </select>
    <button type="submit">{{ 'save' | i18n }}</button>
  </form>
  <p class="error" *ngIf="mensajeError">{{ mensajeError | i18n }}</p>
  <p class="exito" *ngIf="mensajeExito">{{ mensajeExito | i18n }}</p>
</section>

<section class="tarjeta">
  <table>
    <thead>
      <tr>
        <th>{{ 'name' | i18n }}</th>
        <th>{{ 'email' | i18n }}</th>
        <th>{{ 'role' | i18n }}</th>
        <th>{{ 'active' | i18n }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let usuario of usuarios">
        <td>{{ usuario.nombre }}</td>
        <td>{{ usuario.email }}</td>
        <td>{{ usuario.rol }}</td>
        <td>{{ usuario.activo ? ('yes' | i18n) : ('no' | i18n) }}</td>
      </tr>
    </tbody>
  </table>
</section>
